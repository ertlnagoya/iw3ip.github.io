  <text x="88" y="192" fill="#3B556F" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22">Human request -&gt; planner -&gt; diagnostics badge -&gt; execution result</text>

  <rect x="82" y="236" width="1276" height="210" rx="24" fill="white" fill-opacity="0.9" stroke="#D6E1EA"/>

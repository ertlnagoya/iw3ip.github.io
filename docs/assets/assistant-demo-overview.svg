<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <rect width="1440" height="900" fill="#EEF4F8"/>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF2BF"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
  </defs>
  <rect x="40" y="32" width="1360" height="836" rx="30" fill="url(#hero)" stroke="#D6E1EA"/>

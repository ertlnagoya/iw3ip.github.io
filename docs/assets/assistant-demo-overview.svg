  <rect x="110" y="290" width="470" height="52" rx="14" fill="#F8FBFF" stroke="#C7D6E3"/>
  <text x="132" y="323" fill="#14213D" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20">http://localhost:8090</text>
  <text x="650" y="276" fill="#1A3655" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700">Quick Templates</text>
  <rect x="650" y="290" width="190" height="52" rx="26" fill="#D7E6F5"/>
  <text x="687" y="323" fill="#153A5B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">Park Safety (JA)</text>
  <rect x="858" y="290" width="220" height="52" rx="26" fill="#D7E6F5"/>
  <text x="889" y="323" fill="#153A5B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">Station Warning (EN)</text>
  <text x="110" y="380" fill="#1A3655" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700">Request Text</text>
  <rect x="110" y="394" width="1218" height="34" rx="14" fill="#F8FBFF" stroke="#C7D6E3"/>
  <text x="130" y="416" fill="#14213D" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">公園北側でポイ捨てや危険行動が増えていたら教えて。必要なら照明をつけて管理者に通知して。</text>

  <rect x="82" y="472" width="1276" height="122" rx="24" fill="white" fill-opacity="0.9" stroke="#D6E1EA"/>
  <rect x="110" y="510" width="230" height="52" rx="26" fill="#0F766E"/>
  <text x="151" y="543" fill="white" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">POST /assistant/plan</text>
  <rect x="358" y="510" width="250" height="52" rx="26" fill="#0F766E"/>
  <text x="391" y="543" fill="white" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">POST /assistant/execute</text>
  <rect x="626" y="510" width="280" height="52" rx="26" fill="#D7E6F5"/>
  <text x="660" y="543" fill="#153A5B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">GET /assistant/executions</text>

  <rect x="82" y="620" width="1276" height="132" rx="24" fill="white" fill-opacity="0.9" stroke="#D6E1EA"/>
  <text x="110" y="658" fill="#14213D" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" font-weight="700">Planner Diagnostics</text>

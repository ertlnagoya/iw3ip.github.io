  <text x="132" y="712" fill="#146C43" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">code=llm_plan_generated / category=success / severity=info</text>

  <rect x="82" y="776" width="620" height="72" rx="24" fill="#132032"/>
  <text x="110" y="820" fill="#E8F1FF" font-family="IBM Plex Mono, monospace" font-size="20">Plan Result JSON</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860">
  <rect width="1200" height="860" fill="#0f172a"/>
  <text x="48" y="56" fill="#e2e8f0" font-size="28" font-family="Menlo, Monaco, Consolas, monospace" font-weight="700">Publisher outputs: /platform/ingest and /audit/logs</text>
  <rect x="36" y="84" width="1128" height="350" rx="16" fill="#111827" stroke="#334155"/>
  <text x="60" y="122" fill="#93c5fd" font-size="20" font-family="Menlo, Monaco, Consolas, monospace">$ curl http://localhost:8080/platform/ingest</text>
  <text x="60" y="162" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">[</text>
  <text x="80" y="194" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">{ "dataset_id": "home/event/possible_littering", "purpose": "research",</text>
  <text x="80" y="226" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">  "subject_did": "did:example:park-community",</text>
  <text x="80" y="258" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">  "payload": { "message_type": "event", "source": "home_assistant_demo",</text>
  <text x="80" y="290" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">    "payload": { "event_type": "possible_littering", "data": { "location": "park-north" }}}</text>
  <text x="80" y="322" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">},</text>
  <text x="80" y="354" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">{ "dataset_id": "home/event/suspicious_activity", "purpose": "research",</text>
  <text x="80" y="386" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">  "subject_did": "did:example:ha-demo-operator", ... }</text>
  <text x="60" y="418" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">]</text>
  <rect x="36" y="460" width="1128" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <text x="60" y="498" fill="#93c5fd" font-size="20" font-family="Menlo, Monaco, Consolas, monospace">$ curl http://localhost:8080/audit/logs?limit=10</text>
  <text x="60" y="538" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">[</text>
  <text x="80" y="570" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">{ "action": "allow", "dataset_id": "home/event/suspicious_activity",</text>
  <text x="80" y="602" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">  "purpose": "research", "reason": "sent",</text>
  <text x="80" y="634" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">  "raw_topic": "homeassistant/event/suspicious_activity" },</text>
  <text x="80" y="666" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">{ "action": "allow", "dataset_id": "home/event/possible_littering",</text>
  <text x="80" y="698" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">  "purpose": "research", "reason": "sent",</text>
  <text x="80" y="730" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">  "raw_topic": "homeassistant/event/possible_littering" }, ...</text>
  <text x="60" y="762" fill="#e5e7eb" font-size="18" font-family="Menlo, Monaco, Consolas, monospace">]</text>
  <text x="48" y="840" fill="#94a3b8" font-size="18" font-family="Arial, Helvetica, sans-serif">Captured from the actual ha-demo-phase3 run on 2026-03-10.</text>
</svg>

site_name: IoTxWeb3 Intelligence Platform (IW3IP) Docs
site_description: Research and platform documentation for IoTxWeb3 Intelligence Platform (IW3IP)
site_url: https://ertlnagoya.github.io/iw3ip.github.io/
repo_name: ertlnagoya/iw3ip.github.io
repo_url: https://github.com/ertlnagoya/iw3ip.github.io
exclude_docs: README.md

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: ja
          default: true
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            Profile: プロフィール
            Research: 研究
            Keywords: キーワード
            Open Source: オープンソース
            Publications: 論文
            Students: 学生向け
            IW3IP: IW3IP
        - locale: en
          name: English
          build: true
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Profile: profile.md
  - Research: research.md
  - Keywords: keywords.md
  - Open Source: open-source.md
  - Publications: publications.md
  - Students: students.md
  - IW3IP: iw3ip.md

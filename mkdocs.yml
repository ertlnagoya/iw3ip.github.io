site_name: IoTxWeb3 Intelligence Platform (IW3IP)
site_description: Official website for IoTxWeb3 Intelligence Platform (IW3IP)
site_url: https://ertlnagoya.github.io/iw3ip.github.io/
repo_name: ertlnagoya/iw3ip.github.io
repo_url: https://github.com/ertlnagoya/iw3ip.github.io
exclude_docs: README.md

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: ja
          default: true
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            Platform Overview: プラットフォーム概要
            Publications: 論文
            Learning Foundations: 学習基礎
            Course Guide: 授業ガイド
            Learning Roadmap: 学習ロードマップ
            Blockchain Basics: ブロックチェーン基礎
            Hardhat Basics: Hardhat基礎
            SSI DID VC Basics: SSI/DID/VC基礎
            References: 参考文献
            Docs: ドキュメント
            Workshop: ワークショップ
            Before Class: 事前準備と起動
            Facilitation: 進行と運営
            Overview: 概要
            Prerequisites: 事前準備
            Quickstart: 最短起動
            Facilitator Guide: 講師進行ガイド
            Hands-on: ハンズオン
            Phase 1 Data Exchange: Phase 1 データ交換
            Phase 2 Event Sharing: Phase 2 イベント共有
            Phase 3 Intelligence Integration: Phase 3 知能統合
            HuskyLens2 Sample: HUSKYLENS2サンプル
            USB Webcam Sample: USBウェブカメラサンプル
            USB Webcam Event Sharing Sample: USBウェブカメライベント共有サンプル
            HA SSI Publisher Sample: HA x SSI Publisherサンプル
            HA SSI Wallet Sample: スマホSSIウォレットサンプル
            Environment Disaster Sample: 環境・防災イベント共有サンプル
            Regional Safety Assistant Sample: 地域安全アシスタントサンプル
            LLM Planner Hands-on: LLM Plannerハンズオン
            LLM Planner Replacement Spec: LLM Planner置き換え仕様
            Mobile Viewer: スマホ閲覧アプリ
            Operations: 運用
            Troubleshooting: トラブルシュート
            FAQ: FAQ
            Contact: 問い合わせ先
        - locale: en
          name: English
          build: true
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Platform Overview: platform-overview.md
  - Publications: publications.md
  - Learning Foundations:
      - Course Guide: foundations/course-guide.md
      - Learning Roadmap: foundations/roadmap.md
      - Blockchain Basics: foundations/blockchain-basics.md
      - Hardhat Basics: foundations/hardhat-basics.md
      - SSI DID VC Basics: foundations/ssi-did-vc-basics.md
      - References: foundations/references.md
  - Docs: docs.md
  - Contact: contact.md
  - Workshop:
      - Overview: workshop/index.md
      - Before Class:
          - Prerequisites: workshop/prerequisites.md
          - Quickstart: workshop/quickstart.md
      - Facilitation:
          - Facilitator Guide: workshop/facilitator-guide.md
  - Hands-on:
      - Overview: hands-on/index.md
      - Phase 1 Data Exchange:
          - HuskyLens2 Sample: hands-on/huskylens2.md
          - USB Webcam Sample: hands-on/webcam.md
          - HA SSI Publisher Sample: hands-on/ha-ssi-publisher.md
          - Home Assistant Demo Simulator Sample: hands-on/ha-demo-simulator.md
          - Mobile Viewer: hands-on/mobile-viewer.md
      - Phase 2 Event Sharing:
          - USB Webcam Event Sharing Sample: hands-on/webcam-event-sharing.md
          - Environment Disaster Sample: hands-on/environment-disaster.md
          - HA SSI Wallet Sample: hands-on/ha-ssi-wallet.md
          - HA SSI Viewer Sample: hands-on/ha-ssi-viewer.md
          - HA SSI Service Sample: hands-on/ha-ssi-service.md
      - Phase 3 Intelligence Integration:
          - Regional Safety Assistant Sample: hands-on/regional-safety-assistant.md
          - LLM Planner Hands-on: hands-on/llm-planner.md
          - LLM Planner Replacement Spec: hands-on/llm-planner-spec.md
  - Design:
      - Marketplace VC Bridge (v1/v2 spec): design/marketplace-vc-bridge-spec.md
  - Operations:
      - Overview: operations/index.md
      - Troubleshooting: operations/troubleshooting.md
      - FAQ: operations/faq.md
